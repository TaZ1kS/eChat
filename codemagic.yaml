workflows:
  ios-build:
    name: Build iOS App
    instance_type: mac_mini_m1
    max_build_duration: 60
    scripts:
      - name: Build iOS
        script: |
          cd iosApp
          # Використовуємо xcodebuild для збірки
          xcodebuild -workspace iosApp.xcworkspace -scheme iosApp -configuration Release CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
    artifacts:
      - iosApp/build/Release-iphoneos/*.ipa
